      url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
    - name: "The Block"
      url: "https://www.theblock.co/rss.xml"
    - name: "Cointelegraph"
      url: "https://cointelegraph.com/rss"
    - name: "NewsBTC"
      url: "https://www.newsbtc.com/feed/"
    - name: "99Bitcoins"
      url: "https://99bitcoins.com/feed/"
    - name: "Decrypt"
      url: "https://decrypt.co/feed"
    - name: "Blockworks"
      url: "https://blockworks.co/feed"

  regulatory:
    - name: "CoinCenter"
      url: "https://www.coincenter.org/feed/"
    - name: "DeFi Education Fund"
      url: "https://defieducationfund.org/feed/"

  partnerships:
    - name: "CryptoSlate"
      url: "https://cryptoslate.com/feed/"
    - name: "CoinGape"
      url: "https://coingape.com/feed/"
    - name: "Bitcoin.com News"
      url: "https://news.bitcoin.com/feed/"
    - name: "AMBCrypto"
      url: "https://ambcrypto.com/feed/"

  events:
    - name: "Coinpedia Events"
      url: "https://events.coinpedia.org/feed/"

  # Chain-specific event/blog feeds (verified working Apr 2026)
  chain_events:
    - name: "Solana Blog"
      url: "https://solana.com/news/rss.xml"
    - name: "Arbitrum Blog"
      url: "https://arbitrumfoundation.medium.com/feed"
    - name: "Avalanche Blog"
      url: "https://medium.com/feed/avalancheavax"
    - name: "Sui Blog"
      url: "https://blog.sui.io/feed"
    - name: "Mantle Blog"
      url: "https://www.mantle.xyz/blog/rss.xml"
    - name: "Aptos Blog"
      url: "https://medium.com/feed/aptoslabs"
    - name: "Starknet Blog"
      url: "https://medium.com/feed/@starkware"
    - name: "Near Blog"
      url: "https://medium.com/feed/@nearprotocol"
    - name: "BNB Chain Blog"
      url: "https://medium.com/feed/@bnbchain"
    - name: "Virtuals"
