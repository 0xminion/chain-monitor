# Chain Monitor Pipeline Configuration
# Centralized constants — edit here, not in Python files.

pipeline:
  # Concurrency limits
  max_concurrent_collectors: 4
  max_concurrent_chain_analysis: 5

  # Memory back-pressure
  memory_throttle_mb: 500
  memory_throttle_concurrency: 2

  # Data retention
  data_retention_days: 90

# Twitter collector settings
twitter:
  max_workers: 15
  num_batches: 15
  lookback_hours: 24

# Scoring thresholds
scoring:
  similarity_threshold: 0.85
  baseline_tvl_threshold_usd: 1_000_000_000
